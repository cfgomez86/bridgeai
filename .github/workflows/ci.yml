name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: bridgeai
          POSTGRES_PASSWORD: bridgeai
          POSTGRES_DB: bridgeai
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bridgeai:bridgeai@localhost:5432/bridgeai
      AI_PROVIDER: stub
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_AUDIENCE: test-audience

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run migrations
        run: python -m alembic upgrade head

      - name: Run tests
        run: python -m pytest tests/unit tests/integration -q

  frontend:
    name: Frontend lint & typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend
