services:
  db:
    image: postgres:16
    container_name: bridgeai-db
    environment:
      POSTGRES_USER: bridgeai
      POSTGRES_PASSWORD: bridgeai
      POSTGRES_DB: bridgeai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgeai -d bridgeai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
