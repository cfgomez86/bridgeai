[pytest]
# Pytest configuration for BridgeAI

# Minimum Python version
minversion = 7.0

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and verbosity
addopts = 
    -v
    --strict-markers
    --disable-warnings
    --tb=short

# Async support (pytest-asyncio)
asyncio_mode = auto

# Markers for categorizing tests
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (TestClient, in-memory DB)
    e2e: End-to-end tests (full application flow)
    slow: Slow tests
    requires_db: Tests that require database connection
    eval: Retrieval evaluation tests (require indexed codebase, run with -m eval)

# Test paths
testpaths = tests

# Coverage options
[coverage:run]
source = app
omit = 
    */migrations/*
    */tests/*
    */__main__.py
    */config.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
